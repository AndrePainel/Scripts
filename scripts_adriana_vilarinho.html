<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#3d6158;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem}
.app{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 3rem);width:100%;max-width:1100px;border-radius:14px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,0.25)}
.sidebar{background:#4a7a6d;display:flex;flex-direction:column}
.sb-header{padding:1.1rem 1rem .9rem;border-bottom:1px solid rgba(255,255,255,0.12);flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:.85rem}
.sb-icon{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-icon svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}
.sb-clinic{color:#fff;font-size:13px;font-weight:600;line-height:1.3}
.sb-clinic span{display:block;color:rgba(255,255,255,0.55);font-size:11px;font-weight:400;margin-top:1px}

.sb-search input{width:100%;padding:7px 9px 7px 30px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#fff;font-size:13px}
.sb-search input::placeholder{color:rgba(255,255,255,0.4)}

.sb-cats{flex:1;overflow-y:auto;padding:.5rem .5rem .75rem}
.sb-cats::-webkit-scrollbar{width:3px}
.sb-cats::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px}
.cat-group{margin-bottom:.2rem}
.cat-title{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.8px;padding:.55rem .5rem .25rem;font-weight:600}
.proc-btn{width:100%;text-align:left;padding:7px 9px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,0.8);font-size:13px;cursor:pointer;line-height:1.3;transition:background .12s}

.proc-btn .ph{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-top:1px}
.main{background:#5f8a7e;display:flex;flex-direction:column}
.main-topbar{padding:.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-title{color:#fff;font-size:15px;font-weight:600}
.main-sub{color:rgba(255,255,255,0.55);font-size:12px;margin-top:2px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:.9rem 1.2rem .75rem;flex-shrink:0}
.stat-card{background:rgba(255,255,255,0.1);border-radius:9px;padding:.65rem .9rem;border:1px solid rgba(255,255,255,0.08)}
.stat-n{font-size:22px;font-weight:700;color:#fff}

.empty-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,0.35);font-size:14px;padding:3rem;text-align:center;min-height:300px}
.empty-icon{font-size:42px;opacity:.4}
.script-wrap{background:rgba(255,255,255,0.08);border-radius:11px;border:1px solid rgba(255,255,255,0.12);overflow:hidden}
.script-top{padding:.85rem 1rem;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.1)}
.st-name{color:#fff;font-size:14px;font-weight:600}
.st-cat{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.st-actions{display:flex;gap:6px;flex-shrink:0;margin-left:10px;align-items:center}
.act-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.22);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);font-size:12px;cursor:pointer;transition:background .12s}
.act-btn:hover{background:rgba(255,255,255,0.18)}
.act-btn.copied{background:rgba(255,255,255,0.22);color:#fff}
.tipo-pills{display:flex;gap:6px;flex-wrap:wrap;padding:.6rem 1rem .5rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.tipo-pill{padding:5px 13px;border-radius:20px;font-size:12px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;transition:all .12s}
.tipo-pill:hover{color:#fff;border-color:rgba(255,255,255,0.35)}
.tipo-pill.on{background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.4);font-weight:600}
.script-body{padding:1rem 1.1rem}
.script-txt{font-size:14px;line-height:1.9;color:rgba(255,255,255,0.92);white-space:pre-wrap}
.atd-row{display:flex;align-items:center;gap:8px;padding:.55rem 1rem .5rem;border-top:1px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.07)}
.atd-row span{font-size:12px;color:rgba(255,255,255,0.45)}
.atd-row input{padding:5px 9px;border:1px solid rgba(255,255,255,0.18);border-radius:6px;background:rgba(255,255,255,0.08);color:#fff;font-size:12px;width:120px}
.atd-row input::placeholder{color:rgba(255,255,255,0.35)}
.atd-row input:focus{outline:none;background:rgba(255,255,255,0.14)}
.atd-apply{padding:5px 12px;border:1px solid rgba(255,255,255,0.22);border-radius:6px;background:transparent;color:rgba(255,255,255,0.75);font-size:12px;cursor:pointer;transition:all .12s}

@media(max-width:700px){
  body{padding:.5rem}

}

<script>
const CAT={facial:'Facial',corporal:'Corporal',capilar:'Capilar',intimo:'Íntimo',injetavel:'Injetável',estetica:'Estética'};
const TIPOS=['Apresentação','Agendamento','Pós-procedimento','Reativação'];
let copiados=0,tipoAtivo='Apresentação',atendente='Joyce',activeId=null;

const S={
limpezapele:{n:'Limpeza de pele',c:'estetica',h:'Extração, LED, vapor de ozônio',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Queria te contar um pouquinho sobre a nossa Limpeza de Pele aqui na Clínica Adriana Vilarinho!

É um procedimento completo, feito pela nossa equipe de estética, com duração de aproximadamente 1h30. Passamos por várias etapas pensadas para deixar sua pele limpa e com muito mais viço:

✔ Higienização e esfoliação
✔ Vapor de ozônio
✔ Extração de cravos e impurezas
✔ Alta frequência
✔ LED terapia
✔ Máscara facial e finalização

É ótima para controlar a oleosidade, desobstruir os poros e preparar a pele para absorver melhor outros tratamentos. Não tem contraindicações!

Posso te ajudar a agendar? Qualquer dúvida, estou aqui!

At, {atd} 🌷`,
'Agendamento':`Olá! Tudo bem? 😊

Passando para confirmar sua Limpeza de Pele aqui na clínica!

Para aproveitar melhor o procedimento, não é necessário nenhum preparo especial — venha com o rosto limpo e sem maquiagem.

A sessão dura cerca de 1h30, então separe um tempinho no seu dia para se cuidar! 🌿

Qualquer dúvida, estou à disposição. Até lá!

At, {atd} 🌷`,
'Pós-procedimento':`Olá! Como você está se sentindo? 😊

Passando para deixar as orientações pós Limpeza de Pele:

• A pele pode ficar um pouco avermelhada hoje — é completamente normal e passa em até 24 horas
• Evite maquiagem no dia do procedimento
• Use filtro solar diariamente — esse passo é essencial!
• Evite exposição solar intensa nos próximos dias

Qualquer dúvida ou se notar algo diferente, me chame! Estamos sempre por aqui.

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava verificando sua ficha aqui na clínica e vi que faz um tempinho que não nos vemos!

Que tal dar um up na sua pele com uma Limpeza de Pele? Ela é perfeita para dar aquele viço de volta e desobstruir os poros!

Posso verificar os horários disponíveis para você. É só me dizer qual dia fica melhor! 😊

At, {atd} 🌷`
}},
peelquimico:{n:'Peeling químico',c:'estetica',h:'Renovação celular, manchas, acne',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te contar sobre o Peeling Químico aqui na Clínica Adriana Vilarinho!

É um tratamento que usa ácidos específicos para promover a renovação celular da pele. É indicado para:

✔ Clarear manchas e marcas de expressão
✔ Controlar a acne e oleosidade
✔ Melhorar textura e luminosidade da pele
✔ Renovação celular geral

O procedimento é bem rápido — menos de 30 minutos — e pode ser feito mensalmente ou quinzenalmente. A substância usada é escolhida de acordo com o seu tipo de pele!

Quer saber mais ou agendar? Estou aqui! 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Peeling Químico aqui na clínica!

Orientações para o dia:
• Venha com o rosto limpo, sem maquiagem
• Se estiver usando ácidos em casa, suspenda 3 dias antes
• Não venha com a pele descamando ou irritada

O procedimento é rápido, menos de 30 minutos. Depois você já pode retomar sua rotina normalmente!

Qualquer dúvida estou por aqui. Te esperamos!

At, {atd} 🌷`,
'Pós-procedimento':`Olá! Tudo bem? 🌿

Passando com as orientações pós Peeling Químico:

• Use hidratante calmante conforme orientado pela nossa esteticista
• Filtro solar é obrigatório — use diariamente!
• Evite exposição solar direta por pelo menos 7 dias
• Não use ácidos em casa até a pele estar completamente recuperada
• Se descascar, não force — deixe acontecer naturalmente

Qualquer dúvida, estou à disposição!

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava pensando em você! Faz um tempo que não faz o Peeling Químico por aqui — e ele é um dos tratamentos que mais ajudam a manter a pele renovada e as manchas claras.

Que tal retomar? Tenho horários disponíveis essa semana! Me diga o melhor dia para você 😊

At, {atd} 🌷`
}},
beautygym:{n:'Beauty Gym',c:'estetica',h:'Ginástica facial, efeito cinderela',scripts:{
'Apresentação':`Olá! Tudo bem? 😊

Já ouviu falar do Beauty Gym? É uma das nossas queridinhas aqui na Clínica Adriana Vilarinho! 🌿

É uma ginástica facial com efeito lifting imediato — a gente chama de "efeito cinderela" porque você já sai de lá com a pele diferente! O procedimento inclui:

✔ Massagem com bola e massagem manual
✔ Rolete para circulação
✔ Gua sha para drenagem
✔ Eletroestimulação para contrair a musculatura do rosto

Dura cerca de 45 minutos e pode ser feito semanalmente. Perfeito para eventos, fotos ou simplesmente para se sentir mais bonita no dia a dia!

Quer agendar? É só me dizer! 🌷

At, {atd}`,
'Agendamento':`Olá! 😊

Confirmando seu Beauty Gym aqui na clínica — que ótima escolha!

Lembrando que o procedimento não é indicado para quem:
• Está com acne ativa
• Realizou aplicação de fios há menos de 30 dias
• Aplicou toxina botulínica recentemente

Se tiver qualquer uma dessas situações, me avise com antecedência! A sessão dura cerca de 45 minutos. Te esperamos!

At, {atd} 🌷`,
'Pós-procedimento':`Olá! Amou o resultado? ✨

Para potencializar ainda mais o efeito do Beauty Gym:

• Use filtro solar diariamente
• Mantenha a hidratação da pele em casa
• Pode repetir semanalmente ou sempre que quiser!

Qualquer dúvida estou aqui. 😊

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava lembrando de você! O Beauty Gym é daqueles tratamentos que fazem muita diferença na rotina — aquele lifting imediato que deixa a pele mais firme e com viço.

Que tal marcar uma sessão? Fica ótimo antes de qualquer evento! 😊

At, {atd} 🌷`
}},
hydrafacial:{n:'Hydrafacial',c:'facial',h:'Hidro dermoabrasão, todos os tipos de pele',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Queria te apresentar o Hydrafacial, um dos nossos tratamentos favoritos aqui na Clínica Adriana Vilarinho!

É uma hidro dermoabrasão que faz tudo de uma vez só:

✔ Limpa e desobstrui os poros
✔ Esfolia suavemente a pele
✔ Extrai impurezas
✔ Hidrata com séruns ricos em antioxidantes e peptídeos
✔ Deixa a pele visivelmente mais luminosa

O resultado é imediato, sem vermelhidão e sem período de recuperação — você sai da sessão com a pele renovada! Indicado para todos os tipos de pele, inclusive as mais sensíveis.

A sessão dura cerca de 40 minutos e pode ser feita quinzenalmente.

Posso te agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Hydrafacial aqui na clínica!

Não é necessário nenhum preparo especial — venha com o rosto limpo, sem maquiagem. A sessão dura cerca de 40 minutos e você já pode retornar às suas atividades normalmente!

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Passando com os cuidados pós Hydrafacial:

• Use filtro solar diariamente — é o principal cuidado!
• Mantenha a hidratação da pele
• Evite exposição solar intensa logo após o procedimento
• Pode manter sua rotina de skincare normalmente

A pele vai continuar melhorando nos próximos dias! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Faz um tempinho que não passa por aqui para o Hydrafacial! Esse é um daqueles tratamentos que fazem a pele "respirar" — hidratação profunda, poros limpos e aquela luminosidade de volta.

Que tal marcar para essa semana? 😊

At, {atd} 🌷`
}},
aquapure:{n:'Aquapure (Classys)',c:'facial',h:'Limpeza + hidratação inteligente',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te contar sobre o Aquapure, um tratamento facial incrível que temos aqui na clínica!

É um sistema inteligente e não invasivo que cuida da pele de forma completa. Com diferentes aplicadores, ele faz uma limpeza profunda ao mesmo tempo em que aplica ativos que a pele absorve na hora. O resultado:

✔ Pele mais hidratada e com brilho natural
✔ Melhora de textura e elasticidade
✔ Estimulação do colágeno
✔ Sem dor e sem período de recuperação

Não precisa de nenhum preparo especial e a sessão dura cerca de 60 minutos. Pode ser repetido a cada 15 dias!

Quer saber mais? Estou aqui! 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Aquapure aqui na Clínica Adriana Vilarinho!

Não é necessário nenhum preparo — pode vir normalmente. A sessão dura cerca de 60 minutos e você já sai com a pele hidratada e com viço!

Te esperamos com carinho 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Passando com as orientações pós Aquapure:

• Pode ser que a pele fique com leve vermelhidão — passa rapidinho!
• Use filtro solar diariamente
• Mantenha a hidratação em casa para potencializar o resultado

Qualquer dúvida estou por aqui! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava pensando em você! O Aquapure é um daqueles tratamentos que a pele sempre pede — hidratação profunda, limpeza e aquele brilho que todo mundo nota.

Que tal marcarmos uma sessão? 😊

At, {atd} 🌷`
}},
spectra:{n:'Spectra (Lutronic)',c:'facial',h:'Manchas, melasma, acne',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Queria te apresentar o Spectra, um dos nossos lasers mais versáteis aqui na clínica!

Ele possui vários comprimentos de onda e trata diferentes condições:

✔ Manchas e melasma
✔ Acne ativa e cicatrizes de acne
✔ Textura irregular da pele
✔ Poros dilatados

Uma das grandes vantagens é que não precisa de anestésico e pode ser feito em qualquer época do ano! A sessão dura de 15 a 30 minutos.

Realizado pela nossa equipe médica. Posso te agendar uma avaliação? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Spectra aqui na Clínica Adriana Vilarinho!

Não precisa de anestésico nem de preparo especial — venha com a pele limpa e sem maquiagem. A sessão é rápida, de 15 a 30 minutos!

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Spectra:

• Use filtro solar de amplo espectro diariamente — é indispensável!
• Evite exposição solar direta
• Mantenha sua rotina de skincare normalmente

Qualquer dúvida estou aqui! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Faz um tempo que não faz o Spectra por aqui! Ele é perfeito para manter as manchas e a acne sob controle — e quanto mais regular, melhor o resultado.

Que tal retomar? Tenho horários disponíveis! 😊

At, {atd} 🌷`
}},
ultraformer:{n:'Ultraformer MPT (Classys)',c:'facial',h:'Ultrassom micro + macro focado, lifting',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te falar do Ultraformer MPT, um dos nossos tratamentos mais procurados aqui na Clínica Adriana Vilarinho!

É a evolução do ultrassom — combina duas tecnologias poderosas:

✔ Micro focado: promove lifting facial não invasivo em uma única sessão
✔ Macro focado: trata flacidez e gordura corporal

Ele trabalha em diferentes camadas da pele — músculo, gordura, derme profunda e superficial — tudo de forma não cirúrgica. A melhora no contorno e na firmeza já é percebida desde a primeira sessão!

Realizado pela equipe médica. A sessão dura cerca de 90 minutos.

Posso te ajudar a agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Ultraformer MPT aqui na clínica!

Para que tudo corra bem no dia:
• Aplicaremos anestésico tópico com 60 minutos de antecedência
• Venha com a pele limpa, sem maquiagem ou hidratante

A sessão dura cerca de 90 minutos e você não precisa de período de recuperação!

Te esperamos com carinho 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Ultraformer MPT:

• Pode haver leve vermelhidão e inchaço por até 7 dias — é normal!
• Evite exposição solar direta
• Use filtro solar com alto fator de proteção diariamente
• Siga as orientações médicas para potencializar o resultado

O resultado continua evoluindo ao longo de 2 a 3 meses enquanto o colágeno é estimulado 🌿

Qualquer dúvida estou aqui!

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava verificando sua ficha e vi que está próximo do período ideal para retornar com o Ultraformer!

O ideal é manter 1 a 2 sessões por ano para preservar o lifting e a firmeza conquistados. Que tal agendarmos?

At, {atd} 🌷`
}},
morpheus:{n:'Morpheus (InMode)',c:'facial',h:'RF micro agulhada, face e corpo',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Queria te apresentar o Morpheus, um dos tratamentos mais poderosos que temos aqui na clínica!

É uma radiofrequência micro agulhada — combina micro agulhas que chegam às camadas mais profundas da pele com a radiofrequência que aquece e estimula o colágeno. Pode ser usado em:

✔ Rosto e pescoço: flacidez, cicatrizes de acne, linhas finas e papada
✔ Corpo: flacidez, celulite e estrias

Indicado para todos os tipos de pele e realizado pela nossa equipe médica.

Quer saber mais? Posso te ajudar a agendar uma avaliação! 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Morpheus aqui na Clínica Adriana Vilarinho!

Para o dia do procedimento:
• Aplicaremos anestésico tópico 60 minutos antes
• Venha com a pele limpa e sem maquiagem

Após o procedimento é esperado leve eritema e aspereza, que melhora progressivamente em até 7 dias (face) ou 15 dias (corpo).

Qualquer dúvida estou aqui. Te esperamos!

At, {atd} 🌷`,
'Pós-procedimento':`Olá! 😊

Passando com os cuidados pós Morpheus:

• Eritema e aspereza são esperados — face melhora em até 7 dias, corpo até 15 dias
• Possíveis equimoses levam até 10 dias para sumir
• Hidrate bem a pele e use filtro solar diariamente
• Evite sol direto na área tratada por 30 dias

O colágeno continua sendo produzido nas semanas seguintes! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que o Morpheus é indicado de 1 a 2 vezes por ano — e está na hora de manter o resultado que você conquistou!

Que tal agendarmos sua próxima sessão? 😊

At, {atd} 🌷`
}},
thermage:{n:'Thermage (Solta)',c:'facial',h:'RF monopolar, qualquer época do ano',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Queria te apresentar o Thermage, um clássico que nunca sai de moda aqui na Clínica Adriana Vilarinho!

É uma radiofrequência monopolar que promove dois efeitos:

✔ Contração imediata do colágeno — você já nota diferença logo após!
✔ Estimulação de novas fibras de colágeno — o resultado melhora por meses

Pode ser feito no rosto, pescoço, colo, pálpebras, braços, coxas e abdômen. E pode ser realizado em qualquer época do ano!

Sessão de 60 a 90 minutos, resultado que dura de 1 a 2 anos.

Posso te ajudar a agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Thermage aqui na clínica!

Para o dia:
• Aplicaremos anestésico tópico 30 minutos antes
• Venha com a pele limpa

O procedimento não interfere na sua rotina — você já pode retornar às suas atividades normalmente logo após!

Te esperamos com carinho 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Boas notícias: o Thermage não exige cuidados especiais pós-procedimento!

Apenas:
• Continue usando filtro solar diariamente
• Mantenha os cuidados habituais com a pele

O resultado vai melhorando progressivamente ao longo de 2 a 6 meses 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que o Thermage é indicado de 1 a 2 vezes por ano — e manter essa periodicidade é o segredo para preservar a firmeza conquistada!

Que tal agendar sua próxima sessão? 😊

At, {atd} 🌷`
}},
ulthera:{n:'Ulthera (Merz)',c:'facial',h:'Ultrassom micro focado com visualização',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te apresentar o Ulthera, um dos nossos tratamentos mais diferenciados aqui na clínica!

O Ulthera usa ultrassom micro focado com um sistema exclusivo de visualização — a médica vê exatamente as camadas de tecido sendo tratadas em tempo real, garantindo precisão e eficácia máxima.

✔ Lifting de rosto, pescoço e colo
✔ Melhora de rugas e linhas finas
✔ Tratamento da flacidez de dentro para fora

Pode ser feito em qualquer época do ano! Sessão de 60 minutos.

Posso te ajudar a agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Ulthera aqui na Clínica Adriana Vilarinho!

Para o dia:
• Aplicaremos anestésico tópico 60 minutos antes
• Em alguns casos pode ser necessário bloqueio com anestésico injetável para maior conforto
• Venha com a pele limpa

A sessão dura cerca de 60 minutos e você não precisa de período de recuperação!

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Ulthera:

• Pode haver leve inchaço nos dias seguintes — é normal!
• Use filtro solar com alto fator de proteção diariamente
• Siga as orientações da nossa equipe médica

O resultado vai evoluindo ao longo de 2 a 3 meses enquanto o colágeno é produzido 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que o Ulthera é recomendado de 1 a 2 vezes por ano — e manter essa regularidade faz toda a diferença!

Posso verificar os horários disponíveis? 😊

At, {atd} 🌷`
}},
toxina:{n:'Toxina botulínica',c:'injetavel',h:'Botox, Dysport, Xeomin',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te contar um pouco sobre a Toxina Botulínica aqui na Clínica Adriana Vilarinho!

É um dos procedimentos mais realizados no mundo. A toxina relaxa temporariamente os músculos responsáveis pelas rugas de expressão, suavizando:

✔ Linhas da testa e entre as sobrancelhas
✔ Patas de galinha (ao redor dos olhos)
✔ Rugas do pescoço
✔ Excesso de suor (hiperidrose) nas axilas, mãos e pés

Trabalhamos com Dysport, Botox e Xeomin — a escolha é feita pela médica conforme o seu perfil.

O procedimento dura cerca de 30 minutos. Resultado com duração de 4 a 6 meses!

Posso te ajudar a agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando sua aplicação de Toxina Botulínica aqui na clínica!

Lembrando algumas orientações para o dia:
• Venha com o rosto limpo
• Evite anticoagulantes e álcool nos dias anteriores, se possível

Após o procedimento:
• Não deite por 3 horas
• Evite pressão na área tratada no dia da aplicação
• Em caso de hematoma, evite sol até sumir

O resultado aparece gradualmente em até 14 dias!

At, {atd} 🌷`,
'Pós-procedimento':`Olá! 😊

Orientações pós Toxina Botulínica:

• Não deite por pelo menos 3 horas após a aplicação
• Evite pressionar ou massagear a área tratada hoje
• Se aparecer hematoma, evite exposição solar até sumir
• O resultado começa a aparecer em 3 a 7 dias e atinge o pico em até 14 dias

Qualquer dúvida ou se notar algo incomum, me chame! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que já está no período ideal para reaplicar a Toxina Botulínica! O recomendado é de 4 a 6 meses entre as sessões para manter o resultado.

Que tal agendarmos? Posso verificar o melhor dia para você 😊

At, {atd} 🌷`
}},
bioestimulador:{n:'Bioestimulador de colágeno',c:'injetavel',h:'Radiesse, Sculptra, Eleva, HarmonyCa',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te apresentar os Bioestimuladores de Colágeno, um dos tratamentos que mais entregam resultados duradouros aqui na clínica!

São substâncias injetáveis que estimulam o próprio corpo a produzir mais colágeno. Trabalhamos com Radiesse, Sculptra, Eleva e HarmonyCa.

Indicados para:
✔ Flacidez de rosto, pescoço e colo
✔ Flacidez corporal (braços, coxas, abdômen, glúteos, mãos)
✔ Prevenção do "desabamento" da face

O resultado é gradual e natural! Realizado pela equipe médica.

Posso te agendar uma avaliação? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando sua sessão de Bioestimulador de Colágeno aqui na clínica!

Para o dia:
• Aplicaremos anestésico tópico 30 minutos antes
• Venha com a pele limpa

Após o procedimento:
• Massageie a região 2 vezes ao dia por 7 dias — muito importante!
• Evite piscina, mar ou sauna por 24h
• Filtro solar sempre!

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Bioestimulador de Colágeno:

• Pode haver leve inchaço no local — desaparece nos próximos dias
• Possível hematoma que some em até 10 dias
• Massageie a região 2 vezes ao dia por 7 dias — isso é essencial!
• Evite piscina, mar e sauna por 24 horas
• Maquiagem e filtro solar estão liberados

O resultado melhora progressivamente ao longo de 2 a 3 meses! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que já está chegando o período ideal para a próxima sessão de Bioestimulador! Manter a regularidade potencializa muito o resultado.

Que tal agendarmos? Me diga qual o melhor dia para você 😊

At, {atd} 🌷`
}},
preenchedorAH:{n:'Preenchedores AH',c:'injetavel',h:'Restylane, HarmonyCa, Sofiderm, UP',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Vou te contar sobre os nossos Preenchedores de Ácido Hialurônico aqui na Clínica Adriana Vilarinho!

O ácido hialurônico é uma substância natural do nosso corpo que vai sendo perdida com o tempo. Ao repormos, conseguimos:

✔ Suavizar sulcos e rugas profundas
✔ Volumizar lábios, maçãs do rosto e outras áreas
✔ Corrigir assimetrias faciais
✔ Tratar olheiras com fundo de volume
✔ Contorno facial e de queixo

Trabalhamos com Restylane, HarmonyCa, Sofiderm e UP — a escolha é feita pela médica conforme o seu objetivo!

Posso te agendar uma avaliação? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu procedimento de Preenchimento com Ácido Hialurônico aqui na clínica!

Orientações para o dia:
• Venha com a pele limpa, sem maquiagem
• Se possível, evite anticoagulantes nos dias anteriores

Após o procedimento pode haver leve inchaço e hematoma — é normal e transitório!

Te esperamos com carinho! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Preenchimento com Ácido Hialurônico:

• Leve edema e possível hematoma são normais — somem em poucos dias
• Não pressione nem massageie a área tratada
• Use filtro solar diariamente
• Para lábios: evite movimentos excessivos nas primeiras horas

Qualquer dúvida estou aqui! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que o preenchimento com ácido hialurônico vai sendo absorvido gradualmente pelo organismo — e manter o tratamento em dia garante a naturalidade e o volume que você gosta!

Que tal agendarmos uma avaliação com a médica? 😊

At, {atd} 🌷`
}},
profhilo:{n:'Profhilo (Ibsa)',c:'injetavel',h:'AH ultrapuro, firmeza sem volumizar',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te apresentar o Profhilo, um dos tratamentos mais inovadores que temos aqui na clínica!

É um ácido hialurônico ultrapuro, sem aditivos químicos, com alta concentração. Ele não volumiza — age na qualidade da pele:

✔ Estimula colágeno e elastina
✔ Melhora a firmeza e sustentação da pele
✔ Hidratação profunda e de longa duração
✔ Resultado natural — sem mudar as feições

São 2 sessões iniciais com 30 dias de intervalo, depois manutenção a cada 6 meses.

Quer saber mais ou agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Profhilo aqui na Clínica Adriana Vilarinho!

A sessão é rápida — cerca de 30 minutos. Não é necessário preparo especial.

Após o procedimento pode haver uma leve elevação no local que se distribui naturalmente em 24 a 48 horas — é completamente normal!

Te esperamos com carinho 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Profhilo:

• Pode aparecer uma leve elevação no local — ela se distribui sozinha em 24 a 48 horas
• Possíveis equimoses que somem em poucos dias
• Use filtro solar diariamente
• Mantenha hidratação da pele

O resultado melhora nas semanas seguintes! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que está chegando a hora da manutenção do Profhilo! O ideal é manter a cada 6 meses para conservar a firmeza e a qualidade de pele conquistadas.

Posso verificar os horários disponíveis para você? 😊

At, {atd} 🌷`
}},
skinbooster:{n:'Skinbooster (Galderma)',c:'injetavel',h:'AH fluido, hidratação profunda',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te apresentar o Skinbooster — um tratamento injetável focado em hidratação profunda e qualidade de pele!

Diferente dos preenchedores, ele não volumiza — o objetivo é melhorar a textura, a elasticidade e o viço da pele de dentro para fora:

✔ Restylane Vital: para peles mais grossas
✔ Restylane Vital Light: para peles mais finas

Perfeito para pele desidratada, sem brilho ou com textura irregular!

A sessão dura cerca de 30 minutos. Pode ser repetido a cada 4 a 6 semanas.

Quer saber mais? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Skinbooster aqui na clínica!

Não é necessário preparo especial. A sessão dura cerca de 30 minutos.

Após o procedimento pode haver leve inchaço e vermelhidão — são transitórios!

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Skinbooster:

• Possível inchaço, vermelhidão e pequeno hematoma — normal e transitório!
• Evite exposição solar em caso de hematoma
• Use filtro solar diariamente
• Mantenha a rotina de hidratação em casa

O resultado melhora nos dias seguintes! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava pensando em você! O Skinbooster é aquele tratamento que mantém a pele sempre hidratada e com aquele brilho saudável — e manter a periodicidade faz toda a diferença.

Que tal marcarmos sua próxima sessão? 😊

At, {atd} 🌷`
}},
resurfx:{n:'ResurFX (Lumenis)',c:'facial',h:'1565nm não ablativo, todos os fototipos',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te apresentar o ResurFX, um dos nossos lasers mais completos aqui na Clínica Adriana Vilarinho!

É um laser fracionado não ablativo que aquece as camadas mais profundas da pele, estimulando o colágeno de dentro para fora:

✔ Rejuvenescimento facial
✔ Manchas e melasma
✔ Estrias
✔ Rugas e cicatrizes de acne
✔ Queda de cabelo (couro cabeludo)

Pode ser usado em todos os tipos de pele! Tempo de recuperação curto: de 1 a 5 dias.

Posso te ajudar a agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu ResurFX aqui na clínica!

Para o dia:
• Aplicaremos anestésico tópico 60 minutos antes
• Venha com a pele limpa, sem maquiagem ou hidratante
• A pele não pode estar bronzeada

Após a sessão aplicaremos uma máscara calmante por 30 minutos.

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós ResurFX:

• Pode haver inchaço e vermelhidão — somem ao longo dos dias
• Evite exposição solar por 15 dias
• Aplique proteção solar diariamente
• Mantenha a pele hidratada

O resultado continua melhorando nas semanas seguintes! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava verificando sua ficha e vi que está na hora de retomar o ResurFX! A regularidade é o que garante os melhores resultados.

Posso verificar os horários disponíveis para você? 😊

At, {atd} 🌷`
}},
coolsculpting:{n:'Coolsculpting (Allergan)',c:'corporal',h:'Criolipólise, até 27% de redução',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te contar sobre o Coolsculpting, nossa tecnologia de criolipólise aqui na clínica!

É a única criolipólise com aprovação FDA. Com resfriamento de até -11°C e o Sistema Freeze Detect para total segurança:

✔ Reduz até 27% de gordura por sessão
✔ Não invasivo, sem cirurgia e sem recuperação
✔ Resultados visíveis a partir da 4ª semana

O tempo de sessão varia de 35 a 75 minutos por região.

Posso te agendar uma avaliação? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu Coolsculpting aqui na clínica!

Não é necessário preparo especial. A sessão dura de 35 a 75 minutos dependendo da região.

Após o procedimento pode haver inchaço, vermelhidão e dormência — são normais e transitórios! Em caso de hematoma, evite sol.

Te esperamos 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Coolsculpting:

Pós imediato:
• Inchaço, vermelhidão e dormência são esperados
• Evite sol na área se houver hematoma

Pós tardio (~1 semana):
• Pode haver dor, coceira e pontadas na região — faz parte do processo!

Os resultados começam a aparecer a partir da 4ª semana 🌿

Qualquer dúvida estou aqui!

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Passando para te lembrar que novas sessões de Coolsculpting podem ser feitas com intervalo de 60 dias — e cada sessão potencializa o resultado anterior!

Quer agendar? Posso verificar os horários disponíveis 😊

At, {atd} 🌷`
}},
emtone:{n:'EMTone (BTL)',c:'corporal',h:'Radiofrequência + pressão acústica',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te apresentar o EMTone, um dos nossos tratamentos corporais mais inovadores aqui na clínica!

Ele combina radiofrequência e energia de pressão direcionada (ondas acústicas) — tratando não só a aparência da celulite, mas as causas dela:

✔ Redução de celulite de forma não invasiva e indolor
✔ Melhora da flacidez da pele
✔ Tratamento fisiológico

Sessão de 20 a 30 minutos, recomendada uma vez por semana.

Posso te agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando seu EMTone aqui na clínica!

Não é necessário nenhum preparo especial. A sessão dura de 20 a 30 minutos.

Após o procedimento pode haver leve vermelhidão — normal e passageira!

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Pós EMTone as orientações são bem simples:

• Pode haver leve vermelhidão na área tratada — passa rapidinho!
• Mantenha hidratação e alimentação saudável para potencializar o resultado
• Retorne na data combinada para manter a sequência do protocolo

Qualquer dúvida estou aqui 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava verificando que você ainda tem sessões do protocolo EMTone em aberto! A regularidade é essencial para alcançar o resultado esperado no tratamento de celulite.

Que tal retomar? Tenho horários disponíveis essa semana 😊

At, {atd} 🌷`
}},
drenagem:{n:'Drenagem linfática',c:'corporal',h:'Pré e pós-cirúrgico, gestantes',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te contar sobre a Drenagem Linfática aqui na Clínica Adriana Vilarinho!

É uma massagem que estimula o sistema linfático, acelerando a eliminação de líquidos e toxinas. É indicada para:

✔ Pré e pós-cirúrgico
✔ Relaxamento e bem-estar
✔ Melhora da circulação local
✔ Gestantes (com autorização do ginecologista)

Facial: ~30 minutos | Corporal: ~60 minutos

Pode ser feita 1 a 2 vezes por semana. Posso te agendar? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando sua Drenagem Linfática aqui na clínica!

Não é necessário preparo especial. A sessão dura 30 minutos (facial) ou 60 minutos (corporal).

Dica: beba bastante água após o procedimento para potencializar a eliminação de toxinas!

Te esperamos 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Pós Drenagem Linfática:

• Beba bastante água — fundamental para ajudar o organismo a eliminar as toxinas!
• Evite bebidas alcoólicas e alimentos muito processados
• Pode repetir 1 a 2 vezes por semana para manter os resultados

Qualquer dúvida estou aqui! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Estava pensando em você! A Drenagem Linfática é um daqueles cuidados que o corpo agradece sempre.

Que tal marcar uma sessão? 😊

At, {atd} 🌷`
}},
bioimpedancia:{n:'Bioimpedância',c:'corporal',h:'Avaliação de composição corporal, grátis',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Sabia que oferecemos a Bioimpedância gratuitamente aqui na Clínica Adriana Vilarinho?

É um exame que mede a composição corporal, fornecendo informações como:

✔ Percentual de gordura
✔ Massa muscular
✔ Retenção de líquido
✔ Metabolismo basal e IMC

É o ponto de partida ideal para definir o melhor protocolo de tratamento corporal para você!

Quer agendar a sua avaliação? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando sua avaliação com Bioimpedância aqui na clínica!

Para o resultado ser mais preciso:
• Venha em jejum de 2 a 3 horas (incluindo água)
• Retire adornos metálicos (pulseiras, anéis, brincos)
• Evite exercícios intensos no dia anterior

A avaliação é bem rápida! Te esperamos 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Obrigada por fazer sua avaliação conosco!

Com base nos resultados da Bioimpedância, nossa equipe vai indicar o melhor protocolo de tratamento para os seus objetivos.

Qualquer dúvida sobre os próximos passos, estou por aqui! 🌿

At, {atd} 🌷`,
'Reativação':`Olá! Tudo bem? 🌿

Faz um tempinho que não atualiza sua Bioimpedância! Acompanhar sua composição corporal é muito importante para verificar os resultados dos tratamentos.

Que tal passar para uma nova avaliação? É rápido e gratuito! 😊

At, {atd} 🌷`
}},
depilacaosoprano:{n:'Depilação Soprano Ice',c:'corporal',h:'Laser Diodo, todos os fototipos',scripts:{
'Apresentação':`Olá! Tudo bem? 🌿

Deixa eu te contar sobre a nossa Depilação a Laser aqui na Clínica Adriana Vilarinho!

O Soprano Ice é um laser de Diodo com uma característica muito especial: indicado para todos os fototipos de pele, inclusive pele negra — e também funciona em pelos mais finos!

✔ Destrói o bulbo e a haste dos pelos progressivamente
✔ Pelos residuais perdem espessura
✔ Indolor e com sessão rápida

Sessão a partir de 15 minutos. Intervalos de aproximadamente 1 mês.

Quer saber mais? 😊

At, {atd} 🌷`,
'Agendamento':`Olá! 😊

Confirmando sua sessão de Depilação a Laser aqui na clínica!

Orientações importantes:
• Raspe os pelos da região a ser tratada 24 a 48 horas antes
• Evite exposição solar por 30 dias — especialmente nas áreas expostas
• Não venha com a pele bronzeada

Te esperamos! 🌷

At, {atd}`,
'Pós-procedimento':`Olá! 😊

Orientações pós Depilação a Laser:

• Evite exposição solar por 7 dias
• Use filtro solar nas áreas depiladas expostas ao sol
• Não arranque os pelos que crescerem — apenas raspe com lâmina!
• Se necessário, use pomada calmante

Qualquer dúvida estou aqui! 🌿

function renderSidebar(){
  const q=document.getElementById('q').value.toLowerCase();
  const el=document.getElementById('sbCats');
  const groups={};
  Object.keys(S).filter(k=>!q||S[k].n.toLowerCase().includes(q)||S[k].h.toLowerCase().includes(q))
    .forEach(k=>{const c=S[k].c;if(!groups[c])groups[c]=[];groups[c].push(k);});
  if(!Object.keys(groups).length){
    el.innerHTML='<div style="color:rgba(255,255,255,0.4);font-size:13px;padding:1rem .5rem;text-align:center">Nenhum resultado encontrado</div>';
    return;
  }
  el.innerHTML=Object.entries(CAT).filter(([c])=>groups[c]).map(([c,label])=>`
    <div class="cat-group">
      <div class="cat-title">${label}</div>
      ${groups[c].map(k=>`
        <button class="proc-btn${k===activeId?' active':''}" onclick="select('${k}')">
          ${S[k].n}<span class="ph">${S[k].h}</span>
        </button>`).join('')}
    </div>`).join('');
}

function select(id){
  activeId=id;
  renderSidebar();
  showScript(id);
}

function showScript(id){
  const item=S[id];
  if(!item)return;
  document.getElementById('mainTitle').textContent=item.n;
  document.getElementById('mainSub').textContent=CAT[item.c]+' · script pronto';
  const atd=atendente;
  document.getElementById('contentArea').innerHTML=`
    <div class="tipo-pills">${TIPOS.filter(t=>item.scripts[t]).map(t=>`
      <span class="tipo-pill${t===tipoAtivo?' on':''}" onclick="setTipo('${t}','${id}')">${t}</span>`).join('')}</div>
    <div class="script-wrap">
      <div class="script-top">
        <div><div class="st-name">${item.n}</div><div class="st-cat">${CAT[item.c]} · ${tipoAtivo}</div></div>
        <div class="st-actions">
          <button class="act-btn" id="copyBtn" onclick="copiar('${id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copiar
          </button>
        </div>
      </div>
      <div class="script-body">
        <div class="script-txt" id="stxt">${esc(buildScript(id,atd))}</div>
      </div>
      <div class="atd-row">
        <span>Atendente:</span>
        <input id="atdInput" value="${atd}" placeholder="Ex: Joyce" oninput="atualizarAtd('${id}')">
        <button class="atd-apply" onclick="atualizarAtd('${id}')">Aplicar</button>
      </div>
    </div>`;
}

function buildScript(id,atd){
  const item=S[id];
  if(!item||!item.scripts[tipoAtivo])return'Script não disponível.';
  const a=atd||atendente;
  return item.scripts[tipoAtivo].replace(/\{atd\}/g,a);
}

function atualizarAtd(id){
  atendente=document.getElementById('atdInput').value||'Joyce';
  const el=document.getElementById('stxt');
  if(el)el.innerHTML=esc(buildScript(id,atendente));
}

function setTipo(t,id){
  tipoAtivo=t;
  showScript(id);
}

function copiar(id){
  const el=document.getElementById('stxt');
  if(!el)return;
  navigator.clipboard.writeText(el.innerText).then(()=>{
    copiados++;
    document.getElementById('stCopiados').textContent=copiados;
    const btn=document.getElementById('copyBtn');
    if(btn){
      btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Copiado!';
      btn.classList.add('copied');
      setTimeout(()=>{
        btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar';
        btn.classList.remove('copied');
      },2000);
    }
  });
}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
renderSidebar();
</script>
</body>
</html>
